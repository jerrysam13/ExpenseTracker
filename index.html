<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    /* ── Reset & base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0;
      color: #16213e;
    }

    /* ── App header (h1 + dark toggle) ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .dark-toggle {
      position: absolute;
      right: 0;
      padding: 0.3rem 0.85rem;
      border: 1.5px solid #888;
      background: transparent;
      color: inherit;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* ── Layout ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 1rem;
    }

    /* ── Total banner ── */
    .total-amount {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f3460;
    }

    .total-amount span {
      font-size: 1.2rem;
      font-weight: 400;
      color: #888;
    }

    /* ── Budget ── */
    .budget-input-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }

    .budget-input-row span {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
    }

    .budget-input-row input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .budget-input-row input:focus { border-color: #0f3460; }

    .budget-status {
      font-size: 0.85rem;
      margin: 0.4rem 0 0.3rem;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      min-width: 120px;
      padding: 0.6rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row select:focus {
      border-color: #0f3460;
    }

    button.add-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.7rem;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #16213e; }

    /* ── Search ── */
    .search-input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: #0f3460; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-bar button {
      padding: 0.35rem 0.9rem;
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #0f3460;
      color: white;
      border-color: #0f3460;
    }

    /* ── Expense list ── */
    #expense-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: #f8f9fc;
      border-radius: 8px;
    }

    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .expense-info { flex: 1; }

    .expense-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .expense-meta {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }

    .expense-amount {
      font-weight: 700;
      font-size: 1rem;
      color: #0f3460;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.2rem;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #e74c3c; }

    /* ── Edit button ── */
    .edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.05rem;
      line-height: 1;
      padding: 0 0.2rem;
      transition: color 0.2s;
    }

    .edit-btn:hover { color: #0f3460; }

    /* ── Inline edit form ── */
    .edit-form {
      width: 100%;
      padding: 0.75rem;
      background: #f8f9fc;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .edit-actions { display: flex; gap: 0.5rem; }

    .edit-actions .add-btn {
      margin-top: 0;
      flex: 1;
      padding: 0.5rem;
    }

    .cancel-btn {
      flex: 1;
      padding: 0.5rem;
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cancel-btn:hover { border-color: #e74c3c; color: #e74c3c; }

    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 2rem 0;
      font-size: 0.95rem;
    }

    /* ── Breakdown rows (shared by category + monthly cards) ── */
    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0;
    }

    .breakdown-label {
      flex: 1;
      font-size: 0.9rem;
    }

    .breakdown-amount {
      font-weight: 700;
      font-size: 0.9rem;
      color: #0f3460;
      white-space: nowrap;
    }

    .breakdown-pct {
      font-size: 0.78rem;
      color: #aaa;
      width: 3rem;
      text-align: right;
    }

    .bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    .bar-fill {
      height: 4px;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Card header (title + action button on same row) ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-header h2 { margin-bottom: 0; }

    .export-btn {
      padding: 0.3rem 0.75rem;
      border: 1.5px solid #0f3460;
      background: white;
      color: #0f3460;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .export-btn:hover { background: #0f3460; color: white; }

    /* ── Error message ── */
    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    /* ── Insights grid ── */
    .insights-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .insight-item {
      background: #f8f9fc;
      border-radius: 8px;
      padding: 0.75rem 1rem;
    }

    .insight-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.25rem;
    }

    .insight-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0f3460;
    }

    /* ── Sort select ── */
    .sort-select {
      padding: 0.3rem 0.5rem;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 0.8rem;
      background: white;
      color: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color: #0f3460; }

    /* ── Confirm delete ── */
    .expense-item.confirming { background: #fff0f0; }

    .confirm-delete-msg {
      font-size: 0.85rem;
      color: #e74c3c;
      white-space: nowrap;
    }

    .confirm-yes-btn {
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .confirm-yes-btn:hover { background: #c0392b; }

    .confirm-no-btn {
      background: none;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #888;
      transition: all 0.2s;
    }
    .confirm-no-btn:hover { border-color: #888; color: #333; }

    /* ── Dark mode ── */
    body.dark-mode { background: #1a1a2e; color: #e0e0e0; }
    body.dark-mode .card { background: #16213e; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    body.dark-mode .card h2 { color: #666; }
    body.dark-mode .total-amount { color: #a0c4ff; }
    body.dark-mode .form-row input,
    body.dark-mode .form-row select { background: #0f3460; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .filter-bar button { background: #16213e; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .filter-bar button.active { background: #a0c4ff; color: #16213e; border-color: #a0c4ff; }
    body.dark-mode .expense-item { background: #0f3460; }
    body.dark-mode .expense-meta { color: #7a8baa; }
    body.dark-mode .expense-amount { color: #a0c4ff; }
    body.dark-mode .breakdown-amount { color: #a0c4ff; }
    body.dark-mode .bar-track { background: #2a4a8a; }
    body.dark-mode .export-btn { border-color: #a0c4ff; color: #a0c4ff; }
    body.dark-mode .export-btn:hover { background: #a0c4ff; color: #16213e; }
    body.dark-mode .dark-toggle { border-color: #a0c4ff; color: #a0c4ff; }
    body.dark-mode .search-input { background: #0f3460; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .edit-form { background: #0f3460; }
    body.dark-mode .edit-form input,
    body.dark-mode .edit-form select { background: #16213e; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .cancel-btn { background: #16213e; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .budget-input-row input { background: #0f3460; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .insight-item { background: #0f3460; }
    body.dark-mode .insight-value { color: #a0c4ff; }
    body.dark-mode .sort-select { background: #0f3460; border-color: #2a4a8a; color: #e0e0e0; }
    body.dark-mode .expense-item.confirming { background: #3d1515; }
  </style>
</head>
<body>

  <div class="app-header">
    <h1>Expense Tracker</h1>
    <button class="dark-toggle" id="dark-toggle" onclick="toggleDarkMode()">Dark</button>
  </div>

  <div class="container">

    <!-- Total spending card -->
    <div class="card">
      <h2>Total Spent</h2>
      <div class="total-amount">
        $<span id="total">0.00</span>
      </div>
      <div class="budget-input-row">
        <span>Monthly budget</span>
        <input type="number" id="budget-input" placeholder="0.00" min="0" step="0.01"
               onchange="setMonthlyBudget(this.value)" />
      </div>
      <div id="budget-section"></div>
    </div>

    <!-- Insights -->
    <div class="card">
      <h2>Insights</h2>
      <div id="insights"></div>
    </div>

    <!-- Spending by category -->
    <div class="card">
      <h2>By Category</h2>
      <div id="category-breakdown"></div>
    </div>

    <!-- Monthly summary -->
    <div class="card">
      <h2>Monthly Summary</h2>
      <div id="monthly-summary"></div>
    </div>

    <!-- Add expense form -->
    <div class="card">
      <h2>Add Expense</h2>
      <div class="form-row">
        <input type="text" id="expense-name" placeholder="Description (e.g. Coffee)" />
        <input type="number" id="expense-amount" placeholder="Amount" min="0" step="0.01" />
        <select id="expense-category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-row">
        <input type="date" id="expense-date" />
        <input type="text" id="expense-notes" placeholder="Notes (optional)" />
      </div>
      <p class="error-msg" id="error-msg">Please enter a description, a valid amount, and a date.</p>
      <button class="add-btn" onclick="addExpense()">+ Add Expense</button>
    </div>

    <!-- Filter + list -->
    <div class="card">
      <div class="card-header">
        <h2>Expenses</h2>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <select class="sort-select" id="sort-select" onchange="setSort(this.value)">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="amount-high">$ High→Low</option>
            <option value="amount-low">$ Low→High</option>
          </select>
          <button class="export-btn" onclick="exportCSV()">Export CSV</button>
        </div>
      </div>
      <input class="search-input" type="text" placeholder="Search expenses..."
             oninput="setSearch(this.value)" />
      <div class="filter-bar" id="filter-bar">
        <button class="active" onclick="setFilter('All', this)">All</button>
        <button onclick="setFilter('Food', this)">Food</button>
        <button onclick="setFilter('Transport', this)">Transport</button>
        <button onclick="setFilter('Shopping', this)">Shopping</button>
        <button onclick="setFilter('Entertainment', this)">Entertainment</button>
        <button onclick="setFilter('Health', this)">Health</button>
        <button onclick="setFilter('Other', this)">Other</button>
      </div>
      <br />
      <div id="expense-list">
        <p class="empty-state">No expenses yet. Add one above!</p>
      </div>
    </div>

  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────
    let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
    let currentFilter = 'All';
    let searchQuery   = '';
    let editingId     = null;
    let monthlyBudget = parseFloat(localStorage.getItem('monthlyBudget') || '0');
    let darkMode      = localStorage.getItem('darkMode') === 'true';
    let sortOrder          = localStorage.getItem('sortOrder') || 'newest';
    let confirmingDeleteId = null;

    // A colour for each category dot
    const categoryColors = {
      Food:          '#e67e22',
      Transport:     '#3498db',
      Shopping:      '#9b59b6',
      Entertainment: '#e91e8c',
      Health:        '#27ae60',
      Other:         '#95a5a6',
    };

    // ── Save helper ───────────────────────────────────────────────────────────
    function save() {
      localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    // ── Add expense ───────────────────────────────────────────────────────────
    function addExpense() {
      const nameInput   = document.getElementById('expense-name');
      const amountInput = document.getElementById('expense-amount');
      const dateInput   = document.getElementById('expense-date');
      const notesInput  = document.getElementById('expense-notes');
      const category    = document.getElementById('expense-category').value;
      const errorMsg    = document.getElementById('error-msg');

      const name   = nameInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const date   = dateInput.value;
      const notes  = notesInput.value.trim();

      if (!name || isNaN(amount) || amount <= 0 || !date) {
        errorMsg.style.display = 'block';
        return;
      }
      errorMsg.style.display = 'none';

      const expense = {
        id: Date.now(),
        name,
        amount,
        category,
        date,
        notes,
      };

      expenses.unshift(expense);
      save();
      render();

      nameInput.value   = '';
      amountInput.value = '';
      notesInput.value  = '';
      nameInput.focus();
    }

    // ── Delete expense ────────────────────────────────────────────────────────
    function deleteExpense(id) {
      expenses = expenses.filter(e => e.id !== id);
      save();
      render();
    }

    // ── Filter ────────────────────────────────────────────────────────────────
    function setFilter(category, btn) {
      currentFilter = category;
      document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    // ── Search ────────────────────────────────────────────────────────────────
    function setSearch(value) {
      searchQuery = value.trim().toLowerCase();
      render();
    }

    // ── Inline edit ───────────────────────────────────────────────────────────
    function startEdit(id) {
      confirmingDeleteId = null;
      editingId = id;
      render();
    }

    function cancelEdit() {
      editingId = null;
      render();
    }

    function saveEdit(id) {
      const name     = document.getElementById('edit-name').value.trim();
      const amount   = parseFloat(document.getElementById('edit-amount').value);
      const category = document.getElementById('edit-category').value;
      const date     = document.getElementById('edit-date').value;
      const notes    = document.getElementById('edit-notes').value.trim();
      if (!name || isNaN(amount) || amount <= 0 || !date) return;
      const idx = expenses.findIndex(e => e.id === id);
      if (idx === -1) return;
      expenses[idx] = { ...expenses[idx], name, amount, category, date, notes };
      editingId = null;
      save();
      render();
    }

    // ── Dark mode ─────────────────────────────────────────────────────────────
    function toggleDarkMode() {
      darkMode = !darkMode;
      localStorage.setItem('darkMode', darkMode);
      document.body.classList.toggle('dark-mode', darkMode);
      document.getElementById('dark-toggle').textContent = darkMode ? 'Light' : 'Dark';
    }

    // ── Monthly budget ────────────────────────────────────────────────────────
    function setMonthlyBudget(value) {
      const n = parseFloat(value);
      monthlyBudget = (!value || isNaN(n) || n <= 0) ? 0 : n;
      localStorage.setItem('monthlyBudget', monthlyBudget);
      render();
    }

    function renderBudget() {
      const inputEl = document.getElementById('budget-input');
      if (inputEl && document.activeElement !== inputEl)
        inputEl.value = monthlyBudget || '';

      const el = document.getElementById('budget-section');
      if (!monthlyBudget) { el.innerHTML = ''; return; }

      const thisMonth = new Date().toISOString().slice(0, 7);
      const spent = expenses
        .filter(e => e.date.startsWith(thisMonth))
        .reduce((sum, e) => sum + e.amount, 0);
      const pct   = Math.min((spent / monthlyBudget) * 100, 100).toFixed(0);
      const over  = spent > monthlyBudget;
      const warn  = spent >= monthlyBudget * 0.8;
      const color = over ? '#e74c3c' : warn ? '#e67e22' : '#27ae60';

      el.innerHTML = `
        <div class="budget-status" style="color:${color}">
          This month: $${spent.toFixed(2)} of $${monthlyBudget.toFixed(2)}
          ${over ? ' — Over budget!' : warn ? ' — Near limit' : ''}
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>`;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('expense-list');

      // Apply category + search filters
      const visible = expenses
        .filter(e => currentFilter === 'All' || e.category === currentFilter)
        .filter(e => !searchQuery ||
          e.name.toLowerCase().includes(searchQuery) ||
          (e.notes && e.notes.toLowerCase().includes(searchQuery)));

      // Sort
      const sorted = [...visible].sort((a, b) => {
        if (sortOrder === 'oldest')      return a.date.localeCompare(b.date);
        if (sortOrder === 'amount-high') return b.amount - a.amount;
        if (sortOrder === 'amount-low')  return a.amount - b.amount;
        return b.date.localeCompare(a.date); // 'newest' default
      });

      // Update the total (always based on ALL expenses)
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      document.getElementById('total').textContent = total.toFixed(2);

      if (sorted.length === 0) {
        list.innerHTML = `<p class="empty-state">${searchQuery ? 'No matching expenses.' : 'No expenses in this category.'}</p>`;
      } else {
        list.innerHTML = sorted.map(e => {
          // Edit mode: render inline form
          if (e.id === editingId) {
            return `<div class="expense-item" style="flex-direction:column;align-items:stretch">
              <div class="edit-form">
                <div class="form-row">
                  <input type="text"   id="edit-name"     value="${escapeHtml(e.name)}" />
                  <input type="number" id="edit-amount"   value="${e.amount}" min="0" step="0.01" />
                  <select id="edit-category">
                    ${Object.keys(categoryColors).map(c =>
                      `<option${c === e.category ? ' selected' : ''}>${c}</option>`).join('')}
                  </select>
                </div>
                <div class="form-row">
                  <input type="date" id="edit-date"  value="${e.date}" />
                  <input type="text" id="edit-notes" value="${escapeHtml(e.notes || '')}" placeholder="Notes (optional)" />
                </div>
                <div class="edit-actions">
                  <button class="add-btn" onclick="saveEdit(${e.id})">Save</button>
                  <button class="cancel-btn" onclick="cancelEdit()">Cancel</button>
                </div>
              </div>
            </div>`;
          }

          // Read mode: normal or confirming row
          const isConfirming = e.id === confirmingDeleteId;
          return `<div class="expense-item${isConfirming ? ' confirming' : ''}">
            <div class="category-dot" style="background:${categoryColors[e.category] || '#ccc'}"></div>
            <div class="expense-info">
              <div class="expense-name">${escapeHtml(e.name)}</div>
              <div class="expense-meta">${e.category} · ${formatDate(e.date)}${e.notes ? ' · ' + escapeHtml(e.notes) : ''}</div>
            </div>
            <div class="expense-amount">$${e.amount.toFixed(2)}</div>
            ${isConfirming
              ? `<span class="confirm-delete-msg">Delete?</span>
                 <button class="confirm-yes-btn" onclick="deleteExpense(${e.id})">Yes</button>
                 <button class="confirm-no-btn"  onclick="cancelConfirmDelete()">No</button>`
              : `<button class="edit-btn"   onclick="startEdit(${e.id})"          title="Edit">✎</button>
                 <button class="delete-btn" onclick="startConfirmDelete(${e.id})" title="Delete">✕</button>`
            }
          </div>`;
        }).join('');
      }

      renderCategoryBreakdown();
      renderMonthlyBreakdown();
      renderBudget();
      renderInsights();
    }

    // ── Category breakdown ────────────────────────────────────────────────────
    function renderCategoryBreakdown() {
      const el = document.getElementById('category-breakdown');
      if (expenses.length === 0) {
        el.innerHTML = '<p class="empty-state">No expenses yet.</p>';
        return;
      }

      const total = expenses.reduce((sum, e) => sum + e.amount, 0);

      const totals = {};
      expenses.forEach(e => {
        totals[e.category] = (totals[e.category] || 0) + e.amount;
      });

      const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);

      el.innerHTML = sorted.map(([cat, amt]) => {
        const pct = total > 0 ? (amt / total * 100).toFixed(0) : 0;
        const color = categoryColors[cat] || '#ccc';
        return `
          <div class="breakdown-row">
            <div class="category-dot" style="background:${color}"></div>
            <span class="breakdown-label">${cat}</span>
            <span class="breakdown-amount">$${amt.toFixed(2)}</span>
            <span class="breakdown-pct">${pct}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>`;
      }).join('');
    }

    // ── Monthly breakdown ─────────────────────────────────────────────────────
    function renderMonthlyBreakdown() {
      const el = document.getElementById('monthly-summary');
      if (expenses.length === 0) {
        el.innerHTML = '<p class="empty-state">No expenses yet.</p>';
        return;
      }

      const totals = {};
      expenses.forEach(e => {
        const key = e.date.slice(0, 7); // "2026-03"
        totals[key] = (totals[key] || 0) + e.amount;
      });

      const sorted = Object.entries(totals).sort((a, b) => b[0].localeCompare(a[0]));

      el.innerHTML = sorted.map(([key, amt]) => {
        const [y, m] = key.split('-');
        const label = new Date(Number(y), Number(m) - 1, 1)
          .toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        return `
          <div class="breakdown-row">
            <span class="breakdown-label">${label}</span>
            <span class="breakdown-amount">$${amt.toFixed(2)}</span>
          </div>`;
      }).join('');
    }

    // ── Sort ──────────────────────────────────────────────────────────────────
    function setSort(value) {
      sortOrder = value;
      localStorage.setItem('sortOrder', sortOrder);
      render();
    }

    // ── Confirm delete ────────────────────────────────────────────────────────
    function startConfirmDelete(id) {
      confirmingDeleteId = id;
      render();
    }

    function cancelConfirmDelete() {
      confirmingDeleteId = null;
      render();
    }

    // ── Insights ──────────────────────────────────────────────────────────────
    function renderInsights() {
      const el = document.getElementById('insights');
      if (expenses.length === 0) {
        el.innerHTML = '<p class="empty-state">No expenses yet.</p>';
        return;
      }

      const thisMonth = new Date().toISOString().slice(0, 7);
      const thisMonthExpenses = expenses.filter(e => e.date.startsWith(thisMonth));

      const dayOfMonth = new Date().getDate();
      const monthTotal = thisMonthExpenses.reduce((s, e) => s + e.amount, 0);
      const dailyAvg   = monthTotal / dayOfMonth;

      const biggest = expenses.reduce((max, e) => e.amount > max.amount ? e : max, expenses[0]);

      const counts = {};
      expenses.forEach(e => { counts[e.category] = (counts[e.category] || 0) + 1; });
      const topCat = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];

      el.innerHTML = `
        <div class="insights-grid">
          <div class="insight-item">
            <div class="insight-label">This month</div>
            <div class="insight-value">${thisMonthExpenses.length} expenses</div>
          </div>
          <div class="insight-item">
            <div class="insight-label">Daily avg (this month)</div>
            <div class="insight-value">$${dailyAvg.toFixed(2)}</div>
          </div>
          <div class="insight-item">
            <div class="insight-label">Biggest expense</div>
            <div class="insight-value">$${biggest.amount.toFixed(2)}</div>
          </div>
          <div class="insight-item">
            <div class="insight-label">Top category</div>
            <div class="insight-value">${topCat[0]}</div>
          </div>
        </div>`;
    }

    // ── CSV export ────────────────────────────────────────────────────────────
    function exportCSV() {
      if (expenses.length === 0) return;

      const escape = v => `"${String(v).replace(/"/g, '""')}"`;
      const header = ['Date', 'Description', 'Category', 'Amount', 'Notes'].map(escape);
      const rows = expenses.map(e => [
        e.date, e.name, e.category, e.amount.toFixed(2), e.notes || ''
      ].map(escape));

      const csv = [header, ...rows].map(r => r.join(',')).join('\n');
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
        download: 'expenses.csv',
      });
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Date formatter ────────────────────────────────────────────────────────
    function formatDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString();
    }

    // ── Safety helper ─────────────────────────────────────────────────────────
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Allow pressing Enter to add an expense ────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addExpense();
    });

    // ── Initial render on page load ───────────────────────────────────────────
    render();
    document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];

    // Apply persisted sort
    const sortEl = document.getElementById('sort-select');
    if (sortEl) sortEl.value = sortOrder;

    // Apply persisted dark mode
    if (darkMode) {
      document.body.classList.add('dark-mode');
      document.getElementById('dark-toggle').textContent = 'Light';
    }
  </script>

</body>
</html>
