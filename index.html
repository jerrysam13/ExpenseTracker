<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    /* ── Reset & base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      color: #16213e;
    }

    /* ── Layout ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Cards ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 1rem;
    }

    /* ── Total banner ── */
    .total-amount {
      font-size: 2.5rem;
      font-weight: 700;
      color: #0f3460;
    }

    .total-amount span {
      font-size: 1.2rem;
      font-weight: 400;
      color: #888;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .form-row input,
    .form-row select {
      flex: 1;
      min-width: 120px;
      padding: 0.6rem 0.75rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row select:focus {
      border-color: #0f3460;
    }

    button.add-btn {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.7rem;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #16213e; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-bar button {
      padding: 0.35rem 0.9rem;
      border: 1.5px solid #ddd;
      background: white;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-bar button.active {
      background: #0f3460;
      color: white;
      border-color: #0f3460;
    }

    /* ── Expense list ── */
    #expense-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .expense-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      background: #f8f9fc;
      border-radius: 8px;
    }

    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .expense-info { flex: 1; }

    .expense-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .expense-meta {
      font-size: 0.78rem;
      color: #999;
      margin-top: 2px;
    }

    .expense-amount {
      font-weight: 700;
      font-size: 1rem;
      color: #0f3460;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0.2rem;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #e74c3c; }

    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 2rem 0;
      font-size: 0.95rem;
    }

    /* ── Breakdown rows (shared by category + monthly cards) ── */
    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.45rem 0;
    }

    .breakdown-label {
      flex: 1;
      font-size: 0.9rem;
    }

    .breakdown-amount {
      font-weight: 700;
      font-size: 0.9rem;
      color: #0f3460;
      white-space: nowrap;
    }

    .breakdown-pct {
      font-size: 0.78rem;
      color: #aaa;
      width: 3rem;
      text-align: right;
    }

    .bar-track {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      margin-bottom: 0.5rem;
    }

    .bar-fill {
      height: 4px;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Card header (title + action button on same row) ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-header h2 { margin-bottom: 0; }

    .export-btn {
      padding: 0.3rem 0.75rem;
      border: 1.5px solid #0f3460;
      background: white;
      color: #0f3460;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .export-btn:hover { background: #0f3460; color: white; }

    /* ── Error message ── */
    .error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Expense Tracker</h1>

  <div class="container">

    <!-- Total spending card -->
    <div class="card">
      <h2>Total Spent</h2>
      <div class="total-amount">
        $<span id="total">0.00</span>
      </div>
    </div>

    <!-- Spending by category -->
    <div class="card">
      <h2>By Category</h2>
      <div id="category-breakdown"></div>
    </div>

    <!-- Monthly summary -->
    <div class="card">
      <h2>Monthly Summary</h2>
      <div id="monthly-summary"></div>
    </div>

    <!-- Add expense form -->
    <div class="card">
      <h2>Add Expense</h2>
      <div class="form-row">
        <input type="text" id="expense-name" placeholder="Description (e.g. Coffee)" />
        <input type="number" id="expense-amount" placeholder="Amount" min="0" step="0.01" />
        <select id="expense-category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Shopping">Shopping</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-row">
        <input type="date" id="expense-date" />
        <input type="text" id="expense-notes" placeholder="Notes (optional)" />
      </div>
      <p class="error-msg" id="error-msg">Please enter a description, a valid amount, and a date.</p>
      <button class="add-btn" onclick="addExpense()">+ Add Expense</button>
    </div>

    <!-- Filter + list -->
    <div class="card">
      <div class="card-header">
        <h2>Expenses</h2>
        <button class="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
      <div class="filter-bar" id="filter-bar">
        <button class="active" onclick="setFilter('All', this)">All</button>
        <button onclick="setFilter('Food', this)">Food</button>
        <button onclick="setFilter('Transport', this)">Transport</button>
        <button onclick="setFilter('Shopping', this)">Shopping</button>
        <button onclick="setFilter('Entertainment', this)">Entertainment</button>
        <button onclick="setFilter('Health', this)">Health</button>
        <button onclick="setFilter('Other', this)">Other</button>
      </div>
      <br />
      <div id="expense-list">
        <p class="empty-state">No expenses yet. Add one above!</p>
      </div>
    </div>

  </div>

  <script>
    // ── Data ──────────────────────────────────────────────────────────────────
    // We load saved expenses from localStorage (so data survives page refreshes),
    // or start with an empty array if nothing is saved yet.
    let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
    let currentFilter = 'All';

    // A colour for each category dot
    const categoryColors = {
      Food:          '#e67e22',
      Transport:     '#3498db',
      Shopping:      '#9b59b6',
      Entertainment: '#e91e8c',
      Health:        '#27ae60',
      Other:         '#95a5a6',
    };

    // ── Save helper ───────────────────────────────────────────────────────────
    function save() {
      // Whenever expenses change, write them to localStorage so they persist.
      localStorage.setItem('expenses', JSON.stringify(expenses));
    }

    // ── Add expense ───────────────────────────────────────────────────────────
    function addExpense() {
      const nameInput   = document.getElementById('expense-name');
      const amountInput = document.getElementById('expense-amount');
      const dateInput   = document.getElementById('expense-date');
      const notesInput  = document.getElementById('expense-notes');
      const category    = document.getElementById('expense-category').value;
      const errorMsg    = document.getElementById('error-msg');

      const name   = nameInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const date   = dateInput.value;
      const notes  = notesInput.value.trim();

      // Validate: name must not be empty, amount must be a positive number, date required
      if (!name || isNaN(amount) || amount <= 0 || !date) {
        errorMsg.style.display = 'block';
        return;
      }
      errorMsg.style.display = 'none';

      // Build a new expense object and add it to the front of the list
      const expense = {
        id: Date.now(),          // unique ID based on current time
        name,
        amount,
        category,
        date,
        notes,
      };

      expenses.unshift(expense);       // unshift = add to beginning of array
      save();
      render();

      // Clear the inputs ready for the next entry
      nameInput.value   = '';
      amountInput.value = '';
      notesInput.value  = '';
      nameInput.focus();
    }

    // ── Delete expense ────────────────────────────────────────────────────────
    function deleteExpense(id) {
      // Keep every expense whose id does NOT match the one we want to delete
      expenses = expenses.filter(e => e.id !== id);
      save();
      render();
    }

    // ── Filter ────────────────────────────────────────────────────────────────
    function setFilter(category, btn) {
      currentFilter = category;

      // Update which button looks "active"
      document.querySelectorAll('#filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      render();
    }

    // ── Render ────────────────────────────────────────────────────────────────
    // This function redraws the expense list and total every time data changes.
    function render() {
      const list = document.getElementById('expense-list');

      // Filter the list if a category is selected
      const visible = currentFilter === 'All'
        ? expenses
        : expenses.filter(e => e.category === currentFilter);

      // Update the total (always based on ALL expenses, not just the visible ones)
      const total = expenses.reduce((sum, e) => sum + e.amount, 0);
      document.getElementById('total').textContent = total.toFixed(2);

      // Build the HTML for each expense item
      if (visible.length === 0) {
        list.innerHTML = '<p class="empty-state">No expenses in this category.</p>';
      } else {
        list.innerHTML = visible.map(e => `
          <div class="expense-item">
            <div class="category-dot" style="background:${categoryColors[e.category] || '#ccc'}"></div>
            <div class="expense-info">
              <div class="expense-name">${escapeHtml(e.name)}</div>
              <div class="expense-meta">${e.category} · ${formatDate(e.date)}${e.notes ? ' · ' + escapeHtml(e.notes) : ''}</div>
            </div>
            <div class="expense-amount">$${e.amount.toFixed(2)}</div>
            <button class="delete-btn" onclick="deleteExpense(${e.id})" title="Delete">✕</button>
          </div>
        `).join('');
      }

      renderCategoryBreakdown();
      renderMonthlyBreakdown();
    }

    // ── Category breakdown ────────────────────────────────────────────────────
    function renderCategoryBreakdown() {
      const el = document.getElementById('category-breakdown');
      if (expenses.length === 0) {
        el.innerHTML = '<p class="empty-state">No expenses yet.</p>';
        return;
      }

      const total = expenses.reduce((sum, e) => sum + e.amount, 0);

      const totals = {};
      expenses.forEach(e => {
        totals[e.category] = (totals[e.category] || 0) + e.amount;
      });

      const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);

      el.innerHTML = sorted.map(([cat, amt]) => {
        const pct = total > 0 ? (amt / total * 100).toFixed(0) : 0;
        const color = categoryColors[cat] || '#ccc';
        return `
          <div class="breakdown-row">
            <div class="category-dot" style="background:${color}"></div>
            <span class="breakdown-label">${cat}</span>
            <span class="breakdown-amount">$${amt.toFixed(2)}</span>
            <span class="breakdown-pct">${pct}%</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${color}"></div>
          </div>`;
      }).join('');
    }

    // ── Monthly breakdown ─────────────────────────────────────────────────────
    function renderMonthlyBreakdown() {
      const el = document.getElementById('monthly-summary');
      if (expenses.length === 0) {
        el.innerHTML = '<p class="empty-state">No expenses yet.</p>';
        return;
      }

      const totals = {};
      expenses.forEach(e => {
        const key = e.date.slice(0, 7); // "2026-03"
        totals[key] = (totals[key] || 0) + e.amount;
      });

      const sorted = Object.entries(totals).sort((a, b) => b[0].localeCompare(a[0]));

      el.innerHTML = sorted.map(([key, amt]) => {
        const [y, m] = key.split('-');
        const label = new Date(Number(y), Number(m) - 1, 1)
          .toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
        return `
          <div class="breakdown-row">
            <span class="breakdown-label">${label}</span>
            <span class="breakdown-amount">$${amt.toFixed(2)}</span>
          </div>`;
      }).join('');
    }

    // ── CSV export ────────────────────────────────────────────────────────────
    function exportCSV() {
      if (expenses.length === 0) return;

      const escape = v => `"${String(v).replace(/"/g, '""')}"`;
      const header = ['Date', 'Description', 'Category', 'Amount', 'Notes'].map(escape);
      const rows = expenses.map(e => [
        e.date, e.name, e.category, e.amount.toFixed(2), e.notes || ''
      ].map(escape));

      const csv = [header, ...rows].map(r => r.join(',')).join('\n');
      const a = Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
        download: 'expenses.csv',
      });
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Date formatter ────────────────────────────────────────────────────────
    function formatDate(iso) {
      const [y, m, d] = iso.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString();
    }

    // ── Safety helper ─────────────────────────────────────────────────────────
    // Prevent XSS: escape any HTML characters in user-typed text before
    // inserting it into the page.
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Allow pressing Enter to add an expense ────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') addExpense();
    });

    // ── Initial render on page load ───────────────────────────────────────────
    render();
    document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
  </script>

</body>
</html>
